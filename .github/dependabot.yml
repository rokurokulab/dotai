# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# dotai itself ships no language ecosystem dependencies. Only GitHub
# Actions need Dependabot updates. (Docker / Cargo / npm sections will
# join here only if dotai grows native dependencies.)
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      actions-minor-patch:
        update-types: ["minor", "patch"]
