name: Tag Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name to release (e.g., v0.1.0)"
        required: true
        type: string

jobs:
  generate-changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Commit changelog if changed
        run: |
          set -euo pipefail
          DEFAULT_BRANCH=$(git remote show origin | awk '/HEAD branch/ {print $NF}')
          git fetch origin "$DEFAULT_BRANCH"
          if git show-ref --verify --quiet "refs/heads/$DEFAULT_BRANCH"; then
            git checkout "$DEFAULT_BRANCH"
            git branch --set-upstream-to="origin/$DEFAULT_BRANCH" "$DEFAULT_BRANCH"
          else
            git checkout -b "$DEFAULT_BRANCH" "origin/$DEFAULT_BRANCH"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ ! -f CHANGELOG.md ]; then
            echo "ERROR: CHANGELOG.md not produced by git-cliff." >&2
            exit 1
          fi

          if git status --porcelain CHANGELOG.md | grep -q .; then
            git add CHANGELOG.md
            git commit -m "chore: update CHANGELOG for $GITHUB_REF"
            git push origin "$DEFAULT_BRANCH"
          else
            echo "No CHANGELOG.md changes; skipping commit."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: generate-changelog
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine tag name
        id: tag
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
          else
            TAG_NAME="${{ github.ref_name }}"
          fi
          echo "tag_name=${TAG_NAME}" >>"$GITHUB_OUTPUT"
          echo "Tag name: ${TAG_NAME}"

      - name: Generate release notes for current tag
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag ${{ steps.tag.outputs.tag_name }} --verbose
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create or update GitHub Release (with install.sh asset)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: ${{ steps.tag.outputs.tag_name }}
          body_path: RELEASE_NOTES.md
          files: scripts/install.sh
          prerelease: ${{ contains(steps.tag.outputs.tag_name, 'alpha') || contains(steps.tag.outputs.tag_name, 'beta') || contains(steps.tag.outputs.tag_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
