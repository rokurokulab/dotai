# https://taskfile.dev — task runner.
# Run `task --list` to see available recipes.
version: "3"

tasks:
  default:
    desc: List available tasks.
    cmds:
      - task --list

  lint:
    desc: Static checks (license headers + JSON/YAML schema + shellcheck).
    cmds:
      - hawkeye check
      # Validate every JSON file we ship.
      - 'find . -path ./.git -prune -o -name "*.json" -print | xargs -I{} jq empty {}'
      # Validate every workflow YAML by loading it.
      - 'find .github/workflows -name "*.yml" -o -name "*.yaml" 2>/dev/null | xargs -I{} python3 -c "import yaml,sys; yaml.safe_load(open(sys.argv[1]))" {} || true'
      # shellcheck every shell script we ship (no-op until commit 06+).
      - 'find . -path ./.git -prune -o \( -name "*.sh" -o -name "*.bash" \) -print | xargs -r shellcheck'

  render:
    desc: Materialize shared/ into ecosystem dirs (codex/AGENTS.md, claude/plugins/dotai-base/skills/, codex/skills/).
    cmds:
      - bash scripts/render.sh --write

  render-check:
    desc: Fail if any ecosystem file diverges from shared/. CI uses this to block merges that forget to re-render.
    cmds:
      - bash scripts/render.sh --check

  test-install:
    desc: Smoke-test install.sh into a throwaway /tmp target (uses --ref main from live remote; cleans up after).
    cmds:
      - |
        set -eu
        target=$(mktemp -d -t dotai-test-install.XXXXXX)
        trap 'rm -rf "$target"' EXIT
        echo "==> install.sh dry-run (minimal/claude)"
        bash scripts/install.sh --tools claude --bundle minimal --target "$target" --ref main --dry-run
        echo "==> install.sh real install (everything/claude+codex)"
        bash scripts/install.sh --tools claude,codex --bundle everything --target "$target" --ref main --yes
        echo "==> verifying installed tree"
        test -f "$target/AGENTS.md"
        test -f "$target/.claude/plugins/dotai-base/.claude-plugin/plugin.json"
        test -f "$target/.claude/plugins/dotai-conventions/hooks/hooks.json"
        test -f "$target/.codex/config.toml"
        echo "==> ok ($target will be cleaned up by trap)"
