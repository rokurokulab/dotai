# bundles/everything.toml
#
# The full dotai kit. Includes dotai-conventions, which installs a
# PreToolUse git/gh guard and a PostToolUse lint hook. Both run shell
# inside your CC session — install.sh will print the exact commands
# and a 3-second confirmation countdown before installing them. Pass
# --no-hooks to install.sh to skip hooks even when this bundle
# requests them.

name = "everything"
description = "AGENTS.md + all skills + both plugins. Includes the git/gh guard and post-edit-lint hook."

[contents.shared]
agents_md = true
skills = ["code-review", "commit-message", "changelog", "github-pr", "github-issue", "github-milestone", "repo-exploration"]

[contents.claude]
plugins = ["dotai-base", "dotai-conventions"]

[contents.codex]
example_config = true
